<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>File processing pipeline architecture</title>
  <desc>Architecture diagram showing User, FastAPI, Redis, Worker, PostgreSQL, pgAdmin and RedisInsight containers and their connections</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User -->
  <rect x="20" y="210" width="90" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="65" y="237" text-anchor="middle">User</text>

  <!-- FastAPI -->
  <rect x="160" y="188" width="130" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="225" y="210" text-anchor="middle">FastAPI</text>
  <text font-family="sans-serif" font-size="12" x="225" y="228" text-anchor="middle">Upload + Status API</text>

  <!-- Redis -->
  <rect x="360" y="110" width="120" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="420" y="132" text-anchor="middle">Redis</text>
  <text font-family="sans-serif" font-size="12" x="420" y="150" text-anchor="middle">Job queue</text>

  <!-- Worker -->
  <rect x="360" y="260" width="120" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="420" y="282" text-anchor="middle">Worker</text>
  <text font-family="sans-serif" font-size="12" x="420" y="300" text-anchor="middle">Pipeline processor</text>

  <!-- PostgreSQL -->
  <rect x="360" y="400" width="120" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="420" y="422" text-anchor="middle">PostgreSQL</text>
  <text font-family="sans-serif" font-size="12" x="420" y="440" text-anchor="middle">Job tracking</text>

  <!-- pgAdmin -->
  <rect x="540" y="390" width="110" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="595" y="417" text-anchor="middle">pgAdmin</text>

  <!-- RedisInsight -->
  <rect x="540" y="100" width="110" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="595" y="127" text-anchor="middle">RedisInsight</text>

  <!-- Storage -->
  <rect x="160" y="400" width="130" height="56" rx="8" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 4"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="225" y="422" text-anchor="middle">Storage</text>
  <text font-family="sans-serif" font-size="12" x="225" y="440" text-anchor="middle">Shared volume</text>

  <!-- User → FastAPI: gray arrow -->
  <line x1="110" y1="232" x2="158" y2="218" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- FastAPI → Redis: purple arrow, L-shaped -->
  <path d="M290 205 L330 205 L330 138 L358 138" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="324" y="195" text-anchor="middle">job ID</text>

  <!-- Redis → Worker: coral arrow, vertical -->
  <line x1="420" y1="166" x2="420" y2="258" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="434" y="218" text-anchor="start">picks job</text>

  <!-- FastAPI → PostgreSQL: purple arrow -->
  <path d="M225 244 L225 398" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Worker → PostgreSQL: teal arrow -->
  <line x1="420" y1="316" x2="420" y2="398" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" x="434" y="362" text-anchor="start">updates status</text>

  <!-- Worker → Storage: teal arrow, L-shaped -->
  <path d="M360 288 L300 288 L300 428 L292 428" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- pgAdmin → PostgreSQL: gray arrow -->
  <line x1="540" y1="412" x2="482" y2="435" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RedisInsight → Redis: gray arrow -->
  <line x1="540" y1="122" x2="482" y2="148" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Port labels -->
  <text font-family="sans-serif" font-size="12" x="225" y="176" text-anchor="middle">:8000</text>
  <text font-family="sans-serif" font-size="12" x="420" y="98" text-anchor="middle">:6379</text>
  <text font-family="sans-serif" font-size="12" x="420" y="388" text-anchor="middle">:5432</text>
  <text font-family="sans-serif" font-size="12" x="595" y="88" text-anchor="middle">:5540</text>
  <text font-family="sans-serif" font-size="12" x="595" y="378" text-anchor="middle">:9090</text>
</svg>
